services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-diagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diagent}
      POSTGRES_DB: ${POSTGRES_DB:-diagent}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}""]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A diagent.workers.celery_app:celery_app worker --loglevel=${CELERY_LOG_LEVEL:-info}
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://diagent:diagent@postgres:5432/diagent}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
