services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-diagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diagent}
      POSTGRES_DB: ${POSTGRES_DB:-diagent}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}""]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
